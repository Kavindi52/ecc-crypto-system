<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECC Crypto Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container py-5">
    <h1 class="text-center mb-4">Elliptic Curve Cryptography Demo</h1>
    <p class="text-center text-muted">Default curve: y² = x³ + x + 6 (mod 17)</p>

    <!-- Curve parameters -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-3">
            <input id="a" class="form-control" value="1" placeholder="a">
          </div>
          <div class="col-md-3">
            <input id="b" class="form-control" value="6" placeholder="b">
          </div>
          <div class="col-md-3">
            <input id="p" class="form-control" value="17" placeholder="p">
          </div>
          <div class="col-md-3">
            <button onclick="loadPoints()" class="btn btn-primary w-100">List All Points & Draw Curve</button>
          </div>
        </div>
      </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="tabs">
      <li class="nav-item"><a class="nav-link active" data-tab="ops">Basic Operations</a></li>
      <li class="nav-item"><a class="nav-link" data-tab="ecdh">ECDH Key Exchange</a></li>
    </ul>

    <!-- Basic Operations Tab -->
    <div id="ops-tab" class="tab-content">
      <div class="row mb-4">
        <div class="col-12">
          <div style="height: 500px; position: relative;">
            <canvas id="pointChart"></canvas>
          </div>
        </div>
      </div>

      <!-- You can add more operation buttons/forms here later -->
      <div class="text-center">
        <button onclick="performOperation('add')" class="btn btn-outline-primary mx-2">Add Points</button>
        <button onclick="performOperation('double')" class="btn btn-outline-primary mx-2">Double Point</button>
        <button onclick="performOperation('multiply')" class="btn btn-outline-primary mx-2">Scalar Multiply</button>
      </div>
    </div>

    <!-- ECDH Tab -->
    <div id="ecdh-tab" class="tab-content d-none">
      <div class="row g-4">
        <div class="col-md-6">
          <h5>Alice</h5>
          Private key: <input id="privA" class="form-control mb-2" value="5">
          Public key: <span id="pubA" class="badge bg-success"></span>
        </div>
        <div class="col-md-6">
          <h5>Bob</h5>
          Private key: <input id="privB" class="form-control mb-2" value="7">
          Public key: <span id="pubB" class="badge bg-success"></span>
        </div>
        <div class="col-12 text-center">
          <button onclick="runECDH()" class="btn btn-success btn-lg mt-3">Compute Shared Secret</button>
          <h4 class="mt-4">Shared Secret: <span id="shared" class="text-primary"></span></h4>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
